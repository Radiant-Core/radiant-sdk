name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # radiantjs require()s an ESM-only @noble/secp256k1, so the runtime floor is
    # require(ESM) support: Node 20.19+ / 22+. Node 18 is EOL.
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
    name: Node ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (ESM + CJS + types)
        run: npm run build

      - name: Test
        run: npm test
